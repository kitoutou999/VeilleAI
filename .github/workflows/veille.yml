name: Veille quotidienne

on:
  schedule:
    - cron: "30 6 * * *"   # tous les jours a 06h30 UTC (~08h30 Paris)
  workflow_dispatch: {}     # lancement manuel possible depuis l'onglet Actions
  push:
    branches: [main]
    paths: [site/**, pipeline/**, sources.yaml, .github/workflows/veille.yml]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: veille
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Lancer le pipeline
        if: github.event_name != 'push'
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: python -m pipeline.run

      - name: Commit des donnees du jour
        if: github.event_name != 'push'
        run: |
          git config user.name "tomda"
          git config user.email "tomdavid09022003@gmail.com"
          git add site/data
          git diff --cached --quiet || git commit -m "veille: $(date -u +%F)"
          git push

      - name: Upload du site pour Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: pipeline
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
